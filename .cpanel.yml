---
deployment:
  tasks:
    - export DEPLOYPATH=/home/sites/21b/b/b1ad457d94/public_html/
    - export SRC=/home/sites/21b/b/b1ad457d94/my-website-code
    - /bin/test -f $SRC/index.html || { echo "ERROR: index.html missing in $SRC. Pull/restore the Git repository first; public_html was NOT changed."; exit 1; }
    - /bin/test -f $SRC/style.css || { echo "ERROR: style.css missing in $SRC. Pull/restore the Git repository first; public_html was NOT changed."; exit 1; }
    - /bin/test -d $SRC/js || { echo "ERROR: js folder missing in $SRC. Pull/restore the Git repository first; public_html was NOT changed."; exit 1; }
    - /bin/test -d $SRC/data || { echo "ERROR: data folder missing in $SRC. Pull/restore the Git repository first; public_html was NOT changed."; exit 1; }
    - /bin/test -d $SRC/assets || { echo "ERROR: assets folder missing in $SRC. Pull/restore the Git repository first; public_html was NOT changed."; exit 1; }
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/rm -rf $DEPLOYPATH/legacy $DEPLOYPATH/public $DEPLOYPATH/src $DEPLOYPATH/mem $DEPLOYPATH/js $DEPLOYPATH/data $DEPLOYPATH/assets $DEPLOYPATH/wp-admin $DEPLOYPATH/wp-content $DEPLOYPATH/wp-includes $DEPLOYPATH/node_modules $DEPLOYPATH/.tanstack $DEPLOYPATH/.lovable
    - /bin/rm -f $DEPLOYPATH/package.json $DEPLOYPATH/bun.lock $DEPLOYPATH/bunfig.toml $DEPLOYPATH/vite.config.ts $DEPLOYPATH/tsconfig.json $DEPLOYPATH/tsconfig.tsbuildinfo $DEPLOYPATH/eslint.config.js $DEPLOYPATH/components.json $DEPLOYPATH/AGENTS.md $DEPLOYPATH/deploy-cpanel.sh $DEPLOYPATH/.prettierrc $DEPLOYPATH/.prettierignore $DEPLOYPATH/wp-*.php $DEPLOYPATH/license.txt $DEPLOYPATH/readme.html
    - /bin/cp -f $SRC/index.html $SRC/style.css $DEPLOYPATH
    - /bin/test ! -f $SRC/main.mp4 || /bin/cp -f $SRC/main.mp4 $DEPLOYPATH
    - /bin/test ! -f $SRC/robots.txt || /bin/cp -f $SRC/robots.txt $DEPLOYPATH
    - /bin/test ! -f $SRC/sitemap.xml || /bin/cp -f $SRC/sitemap.xml $DEPLOYPATH
    - /bin/mkdir -p $DEPLOYPATH/js $DEPLOYPATH/data $DEPLOYPATH/assets
    - /bin/cp -Rf $SRC/js/. $DEPLOYPATH/js/
    - /bin/cp -Rf $SRC/data/. $DEPLOYPATH/data/
    - /bin/cp -Rf $SRC/assets/. $DEPLOYPATH/assets/
